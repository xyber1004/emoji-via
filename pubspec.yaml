name: emojivia
description: "Daily emoji-trivia game"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <3.10.0'

dependencies:
  flutter:
    sdk: flutter
  go_router: ^14.0.0
  flutter_riverpod: ^2.5.0
  shared_preferences: ^2.2.0
  share_plus: ^10.0.0
  flutter_animate: ^4.5.0
  confetti: ^0.7.0
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/puzzles/
